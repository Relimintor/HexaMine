<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HexaMine</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="menu-screen" id="main-menu">
      <header class="menu-header" aria-label="HexaMine title">
        <img
          class="menu-logo"
          src="assets/header-logo.svg"
          alt="HexaMine"
          onerror="this.style.display='none';document.getElementById('title-fallback').style.display='block';"
        />
        <h1 id="title-fallback" class="title-fallback">HexaMine</h1>
      </header>

      <nav class="menu-actions" aria-label="Main menu actions">
        <button type="button" data-action="new-world">New World</button>
        <button type="button" data-action="load-world">Load World</button>
        <button type="button" data-action="multiplayer">Multiplayer</button>
        <button type="button" data-action="options">Options</button>
        <button type="button" data-action="quit">Quit</button>
      </nav>

      <p class="version" id="version-text">v0.0.0</p>
    </main>

    <noscript>HexaMine</noscript>
    <script type="module" src="main.js"></script>
  </body>
</html>
