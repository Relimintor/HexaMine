<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HEXAMINE World</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="world.css" />
  </head>
  <body>
    <main class="world-layout">
      <section class="world-info">
        <a class="back-link" href="index.html">← Back to menu</a>
        <h1 id="world-title">HEXAMINE World</h1>
        <p id="world-settings"></p>

        <ul class="stats" id="world-stats"></ul>

        <p class="note">
          Sphere rule enforced: exactly <strong>12 pentagons</strong>, all remaining tiles are hexagons.
        </p>
      </section>

      <section class="viewer">
        <canvas id="world-canvas" width="900" height="900" aria-label="HexaMine planet preview"></canvas>
      </section>
    </main>

    <script src="world.js"></script>
  </body>
</html>
